name: ci

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Run pytest
        run: |
          cd scripts
          uv run --with pytest pytest -v

  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: |
            news/**/*.md
            README.md
            .claude/skills/**/*.md
